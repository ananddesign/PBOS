<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Personal Brand OS</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4EFE4;--card:#FFFFFF;--sb:#141414;
  --yellow:#E9D94C;--yellow-t:rgba(233,217,76,.18);
  --pink:#F2B8C6;--pink-t:rgba(242,184,198,.2);
  --olive:#A8C46A;--olive-t:rgba(168,196,106,.18);
  --blue:#B8CCF0;--blue-t:rgba(184,204,240,.2);
  --teal:#4ECDC4;--teal-t:rgba(78,205,196,.15);
  --text:#1A1A1A;--muted:#8A8A8A;--border:#E2D9CA;
  --mono:'DM Mono',monospace;--sans:'Plus Jakarta Sans',sans-serif;
}
*{font-family:var(--sans)}
body{background:var(--bg);color:var(--text);font-size:13px;min-height:100vh}
.app{display:grid;grid-template-columns:230px 1fr 290px;min-height:100vh}

/* SIDEBAR */
.sidebar{background:var(--sb);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.logo{padding:22px 20px 20px;border-bottom:1px solid rgba(255,255,255,.07)}
.logo-name{font-size:20px;font-weight:800;color:#fff;letter-spacing:-.04em}
.logo-dot{color:var(--yellow)}
.logo-sub{font-size:10px;color:rgba(255,255,255,.35);margin-top:4px;line-height:1.5;font-weight:400}
.nav{padding:16px 10px;flex:1}
.nl{font-size:9px;color:rgba(255,255,255,.28);letter-spacing:.1em;text-transform:uppercase;padding:0 10px 7px;margin-top:10px;font-weight:600}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:10px;cursor:pointer;color:rgba(255,255,255,.45);font-size:12px;font-weight:500;margin-bottom:1px;transition:all .14s;user-select:none}
.ni:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.8)}
.ni.active{background:rgba(255,255,255,.1);color:#fff;font-weight:600}
.ni-icon{font-size:13px;width:18px;text-align:center;flex-shrink:0}
.nb{margin-left:auto;font-size:9px;font-family:var(--mono);padding:2px 7px;border-radius:20px;background:var(--yellow);color:#2a2800;font-weight:600}
.nb-g{background:var(--olive);color:#1a3200}
.sfooter{padding:14px 10px;border-top:1px solid rgba(255,255,255,.07)}
.ccard{background:rgba(255,255,255,.05);border-radius:12px;padding:12px 14px}
.ctitle{font-size:9px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:10px;font-weight:600}
.crow{font-size:11px;color:rgba(255,255,255,.4);display:flex;align-items:center;gap:7px;margin-bottom:5px;font-weight:500}
.crow:last-child{margin-bottom:0}
.cdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* MAIN */
.main{display:flex;flex-direction:column;padding:26px 22px;min-height:100vh}
.view{display:none}.view.active{display:flex;flex-direction:column;gap:14px}

/* topbar */
.topbar{display:flex;align-items:center;gap:10px}
.search-wrap{display:flex;align-items:center;gap:8px;background:#fff;border:1.5px solid var(--border);border-radius:50px;padding:7px 16px;flex:0 0 auto;width:220px}
.search-icon{color:var(--muted);font-size:13px;flex-shrink:0}
.search-input{border:none;outline:none;font-size:12px;color:var(--text);background:transparent;flex:1;font-weight:500}
.search-input::placeholder{color:var(--muted)}
.fpills{display:flex;gap:5px}
.fpill{font-size:10px;font-weight:600;padding:4px 12px;border-radius:20px;cursor:pointer;transition:all .13s;white-space:nowrap}
.fpill.on{background:var(--text);color:#fff}
.fpill.off{background:#fff;color:var(--muted);border:1.5px solid var(--border)}
.tbbtns{display:flex;gap:7px;margin-left:auto}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 15px;border-radius:50px;font-size:11px;font-weight:600;cursor:pointer;border:none;transition:all .13s;user-select:none}
.btn.dark{background:var(--text);color:#fff}
.btn.dark:hover{opacity:.82}
.btn.light{background:#fff;color:var(--text);border:1.5px solid var(--border)}
.btn.light:hover{background:var(--bg)}
.btn.sm{padding:6px 13px;font-size:10px}

/* greeting */
.greeting-title{font-size:28px;font-weight:800;letter-spacing:-.04em;line-height:1.1;margin-bottom:5px}
.greeting-sub{font-size:12px;color:var(--muted);line-height:1.55;max-width:500px;font-weight:500}

/* KPI row */
.kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.kpi-card{border-radius:20px;padding:20px 22px;overflow:hidden;position:relative;min-height:160px;display:flex;flex-direction:column;justify-content:space-between}
.kpi-card.yellow{background:var(--yellow)}
.kpi-card.pink{background:var(--pink)}
.kpi-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;opacity:.55;margin-bottom:7px}
.kpi-val{font-size:46px;font-weight:800;letter-spacing:-.05em;line-height:1}
.kpi-sub{font-size:11px;font-weight:500;opacity:.55;margin-top:5px}
.kpi-bottom{display:flex;gap:18px;align-items:flex-end}
.kpi-stat{display:flex;flex-direction:column}
.kv{font-size:22px;font-weight:800;letter-spacing:-.03em;line-height:1}
.kl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;opacity:.5;margin-top:2px}
.kpi-deco{position:absolute;right:-8px;bottom:-8px;opacity:.15}

/* Mid row */
.mid-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mc{border-radius:20px;padding:18px 20px;overflow:hidden;position:relative}
.mc.olive{background:var(--olive)}
.mc.blue{background:var(--blue)}
.mc-title{font-size:12px;font-weight:700;letter-spacing:-.01em;margin-bottom:13px;opacity:.75}
.pipe-row{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.pipe-row:last-child{margin-bottom:0}
.pipe-stage{font-size:10px;font-weight:600;width:76px;flex-shrink:0;opacity:.7}
.pipe-track{flex:1;height:5px;background:rgba(0,0,0,.12);border-radius:3px;overflow:hidden}
.pipe-fill{height:100%;border-radius:3px;background:rgba(0,0,0,.35)}
.pipe-n{font-family:var(--mono);font-size:10px;width:14px;text-align:right;opacity:.65;font-weight:500}
.warn{margin-top:12px;background:rgba(180,40,0,.12);border-radius:9px;padding:8px 10px;font-size:10px;color:#7A2000;font-weight:600;line-height:1.4}
.mc-deco{position:absolute;right:-8px;bottom:-8px;opacity:.12}
.pil-row{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.pil-row:last-child{margin-bottom:0}
.pil-label{font-size:10px;font-weight:600;width:86px;flex-shrink:0;opacity:.7}
.pil-track{flex:1;height:5px;background:rgba(0,0,0,.12);border-radius:3px;overflow:hidden}
.pil-fill{height:100%;border-radius:3px;background:rgba(0,0,0,.35)}
.pil-n{font-family:var(--mono);font-size:10px;width:14px;text-align:right;opacity:.65}

/* Bot row */
.bot-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.wcard{background:#fff;border-radius:20px;padding:18px}
.wcard-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.wcard-title{font-size:13px;font-weight:700;letter-spacing:-.01em}
.wcard-tag{font-size:9px;font-weight:600;color:var(--muted);background:var(--bg);padding:3px 10px;border-radius:20px}
.post-item{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--border)}
.post-item:last-child{border-bottom:none}
.picon{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.picon.obs{background:var(--yellow-t)}
.picon.find{background:var(--teal-t)}
.picon.exp{background:var(--pink-t)}
.pinfo{flex:1;min-width:0}
.ptitle{font-size:11px;font-weight:600;color:var(--text);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.psub{font-size:9px;color:var(--muted);margin-top:2px;font-weight:500}
.pright{text-align:right;flex-shrink:0}
.ptag{font-size:9px;font-family:var(--mono);color:var(--muted);background:var(--bg);padding:3px 8px;border-radius:20px;font-weight:500;white-space:nowrap}
.pbar{height:3px;width:48px;background:var(--border);border-radius:2px;margin-top:5px;margin-left:auto}
.pfill{height:100%;border-radius:2px;background:var(--olive)}
.detail-card{background:var(--pink);border-radius:20px;padding:18px;display:flex;flex-direction:column;gap:10px}
.dc-name{font-size:16px;font-weight:800;letter-spacing:-.03em}
.dc-meta{font-size:11px;opacity:.55;font-weight:500}
.dc-id{font-size:9px;font-family:var(--mono);background:rgba(0,0,0,.1);padding:3px 9px;border-radius:20px;color:rgba(0,0,0,.6);font-weight:500}
.dc-tags{display:flex;gap:5px;flex-wrap:wrap}
.dctag{font-size:10px;font-weight:600;background:rgba(0,0,0,.1);padding:3px 10px;border-radius:20px;color:rgba(0,0,0,.7)}
.dc-row{display:grid;grid-template-columns:90px 1fr;gap:8px;align-items:start;font-size:11px}
.dc-key{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;opacity:.45;padding-top:1px}
.dc-val{font-weight:500;opacity:.8;line-height:1.45}
.dc-divider{height:1px;background:rgba(0,0,0,.08)}
.dc-btn{background:rgba(0,0,0,.85);color:#fff;border:none;border-radius:12px;padding:10px;font-size:11px;font-weight:600;cursor:pointer;text-align:center;transition:opacity .13s}
.dc-btn:hover{opacity:.8}

/* RIGHT PANEL */
.rpanel{background:var(--bg);border-left:1.5px solid var(--border);padding:26px 18px;display:flex;flex-direction:column;gap:18px;position:sticky;top:0;height:100vh;overflow-y:auto}
.cal-head{display:flex;align-items:center;justify-content:space-between}
.cal-navs{display:flex;gap:4px;align-items:center}
.cal-nb{width:26px;height:26px;background:#fff;border:1.5px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;color:var(--muted);transition:all .12s}
.cal-nb:hover{border-color:var(--text);color:var(--text)}
.cal-month-label{font-size:12px;font-weight:700;margin:0 6px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dh{font-size:8px;font-weight:700;color:var(--muted);text-align:center;padding:4px 0;text-transform:uppercase;letter-spacing:.05em}
.cal-d{height:30px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;border-radius:8px;cursor:pointer;color:var(--muted);transition:all .12s}
.cal-d:hover{background:#fff;color:var(--text)}
.cal-d.cur{color:var(--text);font-weight:600}
.cal-d.today{background:var(--pink);color:#fff;font-weight:700}
.cal-d.posted{color:var(--text);font-weight:700;position:relative}
.cal-d.posted::after{content:'';display:block;width:4px;height:4px;border-radius:50%;background:var(--olive);position:absolute;margin-top:18px}
.cal-d.sched{background:var(--yellow-t);color:#5a4800;font-weight:700}
.rp-add{background:var(--text);color:#fff;border:none;border-radius:12px;padding:10px;font-size:12px;font-weight:600;cursor:pointer;width:100%;transition:opacity .13s}
.rp-add:hover{opacity:.82}
.rp-row2{display:flex;gap:6px}
.rp-icon-btn{flex:1;background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:8px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
.rp-icon-btn:hover{border-color:var(--text)}
.tl-head{display:flex;align-items:center;justify-content:space-between}
.tl-date{font-size:14px;font-weight:800;letter-spacing:-.02em}
.tl-filter{font-size:9px;font-weight:700;background:var(--text);color:#fff;padding:4px 10px;border-radius:20px;cursor:pointer}
.tl-label{font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin:0 0 6px}
.tl-item{display:flex;gap:9px;padding:7px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.tl-item:last-child{border-bottom:none}
.tl-time{font-size:9px;font-family:var(--mono);color:var(--muted);width:30px;flex-shrink:0;padding-top:4px;font-weight:500;line-height:1.2}
.tl-dot{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.tl-dot.obs{background:var(--yellow-t)}
.tl-dot.find{background:var(--blue-t)}
.tl-dot.exp{background:var(--pink-t)}
.tl-dot.meet{background:var(--olive-t)}
.tl-info{flex:1;min-width:0}
.tl-title{font-size:11px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:1px}
.tl-sub{font-size:9px;color:var(--muted);font-weight:500}
.tl-view{background:var(--text);color:#fff;border:none;border-radius:10px;padding:9px;font-size:11px;font-weight:600;cursor:pointer;width:100%}

/* PILLS */
.pill{font-size:8px;font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase;padding:2px 7px;border-radius:20px;font-weight:600}
.pill.obs{background:var(--yellow-t);color:#5a4800}
.pill.find{background:var(--teal-t);color:#006560}
.pill.exp{background:var(--pink-t);color:#6B1030}
.spill{display:inline-flex;align-items:center;font-size:8px;font-family:var(--mono);padding:2px 7px;border-radius:20px;letter-spacing:.05em;font-weight:600}
.spill.obs{background:var(--yellow-t);color:#5a4800}
.spill.find{background:var(--teal-t);color:#006560}
.spill.exp{background:var(--pink-t);color:#6B1030}
.status-pill{font-size:9px;font-family:var(--mono);padding:3px 9px;border-radius:20px;font-weight:600}
.status-pill.posted{background:var(--olive-t);color:#2a4a00}
.status-pill.scheduled{background:var(--yellow-t);color:#4a3a00}
.status-pill.drafting{background:var(--blue-t);color:#1a2a5a}
.status-pill.inbox{background:rgba(0,0,0,.06);color:var(--muted)}
.status-pill.exploring{background:var(--teal-t);color:#006560}
.status-pill.repurpose{background:var(--pink-t);color:#6B1030}
.status-pill.ready{background:var(--olive-t);color:#2a4a00}

/* NON-DASHBOARD */
.sh{display:flex;align-items:center;justify-content:space-between}
.sh-title{font-size:20px;font-weight:800;letter-spacing:-.03em}
.sh-sub{font-size:11px;color:var(--muted);font-weight:500;margin-top:2px}
.fi{width:100%;background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:9px 13px;color:var(--text);font-size:12px;outline:none;transition:border-color .14s;font-weight:500}
.fi:focus{border-color:var(--text)}
.fsel{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:8px 12px;color:var(--text);font-size:11px;outline:none;cursor:pointer;font-weight:500}
.capture-bar{display:flex;gap:7px}
.db-table{width:100%;border-collapse:collapse;background:#fff;border-radius:18px;overflow:hidden}
.db-table th{font-size:9px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.07em;text-align:left;padding:10px 13px;border-bottom:1.5px solid var(--border);font-weight:500}
.db-table td{padding:10px 13px;border-bottom:1px solid var(--border);vertical-align:middle}
.db-table tr:last-child td{border-bottom:none}
.db-table tbody tr:hover td{background:var(--bg)}
.kanban{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px;overflow-x:auto}
.kcol{background:#fff;border-radius:16px;padding:11px;min-width:125px}
.kcol-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.kcol-name{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
.kcol-n{font-size:9px;background:var(--bg);color:var(--muted);padding:2px 7px;border-radius:20px;font-family:var(--mono)}
.kcard{background:var(--bg);border-radius:11px;padding:9px;margin-bottom:6px;cursor:pointer;transition:all .12s;border:1.5px solid transparent}
.kcard:hover{border-color:var(--border);background:#fff}
.kcard:last-child{margin-bottom:0}
.kcard-title{font-size:11px;color:var(--text);line-height:1.35;margin-bottom:6px;font-weight:500}
.kcard-meta{display:flex;align-items:center;gap:5px}
.kcard-fmt{font-size:9px;color:var(--muted);font-family:var(--mono)}
.kcard-date{font-size:9px;color:var(--muted);margin-left:auto;font-family:var(--mono)}
.kcard.scheduled{border-color:rgba(233,217,76,.5);background:rgba(233,217,76,.07)}
.kcard.repurpose{border-color:rgba(242,184,198,.5);background:rgba(242,184,198,.07)}
.cal-view-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cv-dh{font-size:9px;font-weight:600;color:var(--muted);text-align:center;padding:5px 0;text-transform:uppercase;letter-spacing:.05em}
.cv-d{background:#fff;border-radius:12px;padding:7px;min-height:80px;cursor:pointer;transition:border .12s;border:1.5px solid transparent}
.cv-d:hover{border-color:var(--border)}
.cv-d.today{border-color:var(--pink);background:rgba(242,184,198,.06)}
.cv-d.empty{opacity:0;pointer-events:none}
.cv-num{font-size:9px;font-family:var(--mono);color:var(--muted);margin-bottom:5px;font-weight:500}
.cv-post{font-size:9px;padding:3px 5px;border-radius:6px;margin-bottom:3px;line-height:1.3;font-weight:600}
.cv-post.obs{background:var(--yellow-t);color:#5a4800}
.cv-post.find{background:var(--blue-t);color:#1a2a5a}
.cv-post.exp{background:var(--pink-t);color:#5a1a28}
.cv-post.sched{background:var(--olive-t);color:#2a4a00}
.exp-card{background:#fff;border-radius:16px;padding:16px;display:grid;grid-template-columns:1fr auto;gap:12px;cursor:pointer;transition:all .12s;border:1.5px solid transparent}
.exp-card:hover{border-color:var(--border)}
.exp-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px;letter-spacing:-.01em}
.exp-meta{font-size:11px;color:var(--muted);line-height:1.5;font-weight:500}
.exp-note{font-size:10px;font-family:var(--mono);margin-top:7px;font-weight:500}
.draft-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.ai-panel{background:#fff;border-radius:18px;overflow:hidden}
.ai-ph{padding:14px 18px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ai-lab{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.ai-title{font-size:14px;font-weight:700;letter-spacing:-.02em}
.ai-pb{padding:18px}
.fg{margin-bottom:13px}
.fl{font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
textarea.fi{resize:vertical;min-height:80px;line-height:1.55}
.draft-out{background:var(--bg);border-radius:12px;padding:14px;font-size:12px;line-height:1.75;color:var(--text);min-height:170px;white-space:pre-wrap;font-weight:500;border:1.5px solid var(--border)}
.draft-hook{font-weight:800;font-size:13px;display:block;margin-bottom:8px;letter-spacing:-.02em}
.ld{display:inline-flex;gap:5px;align-items:center}
.ldd{width:6px;height:6px;border-radius:50%;background:var(--text);animation:pulse 1.2s ease-in-out infinite}
.ldd:nth-child(2){animation-delay:.2s}.ldd:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,100%{opacity:.15;transform:scale(.7)}50%{opacity:1;transform:scale(1)}}
.rules-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.rule-card{background:#fff;border-radius:16px;padding:16px}
.rule-type{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:11px;padding:3px 10px;border-radius:20px;display:inline-block}
.rule-step{display:flex;align-items:flex-start;gap:7px;margin-bottom:5px;font-size:11px;color:var(--muted);line-height:1.4;font-weight:500}
.rule-n{font-family:var(--mono);color:rgba(0,0,0,.2);font-size:9px;flex-shrink:0;width:14px;margin-top:1px}
.voice-panel{background:#fff;border-radius:18px;padding:18px}
.voice-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.vtag{font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;margin:0 4px 5px 0;display:inline-block}
.prio{display:flex;gap:3px}
.pd{width:5px;height:5px;border-radius:50%}

/* ═══════════════════════════════
   HELPERS
═══════════════════════════════ */
const ICONS  = { obs: '✍', find: '⌘', exp: '◉' };
const LABELS = { obs: 'Observation', find: 'Cool Find', exp: 'Experiment',
                 Observation: 'obs', 'Cool Find': 'find', Experiment: 'exp' };

function pill(p, label)  { return `<span class="pill ${p}">${label||LABELS[p]||p}</span>`; }
function spill(p)        { return `<span class="spill ${p}">${LABELS[p]||p}</span>`; }
function statusPill(s)   { return `<span class="status-pill ${s}">${s}</span>`; }
function prio(n, max=5)  { return `<div class="prio">${Array.from({length:max},(_,i)=>`<span class="pd" style="background:${i<n?'var(--yellow)':'var(--border)'}"></span>`).join('')}</div>`; }
function getGreeting()   { const h=new Date().getHours(); return h<12?'Good morning':h<17?'Good afternoon':'Good evening'; }

function renderRightPanel() {
  const cal = DATA.calendar;
  const evMap = {};
  cal.events.forEach(e => evMap[e.day] = e);

  const miniDays = ['Mo','Tu','We','Th','Fr','Sa','Su'].map(d=>`<div class="cal-dh">${d}</div>`).join('');
  let cells = Array(cal.startWeekday).fill('<div class="cal-d"></div>').join('');
  for(let d=1; d<=cal.totalDays; d++) {
    const ev = evMap[d];
    let cls = 'cal-d cur';
    if(d === cal.today)               cls += ' today';
    else if(ev?.pillar === 'sched')   cls += ' sched';
    else if(ev)                       cls += ' posted';
    cells += `<div class="${cls}">${d}</div>`;
  }

  const tlItems = DATA.timeline.map(t => `
    <div class="tl-item">
      <div class="tl-time">${t.time}</div>
      <div class="tl-dot ${t.type}">${t.icon}</div>
      <div class="tl-info">
        <div class="tl-title">${t.title}</div>
        <div class="tl-sub">${t.sub}</div>
      </div>
    </div>`).join('');

  document.getElementById('rpanel').innerHTML = `
    <div class="cal-head">
      <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em">${cal.month}</div>
      <div class="cal-navs">
        <div class="cal-nb">‹</div>
        <div class="cal-month-label">${cal.month}</div>
        <div class="cal-nb">›</div>
      </div>
    </div>
    <div><div class="cal-grid">${miniDays}${cells}</div></div>
    <button class="rp-add" onclick="go('inbox',null)">+ Add event</button>
    <div class="rp-row2"><div class="rp-icon-btn">↺</div><div class="rp-icon-btn">⊡</div></div>
    <div class="tl-head">
      <div class="tl-date">${cal.month.split(' ')[0]} ${cal.today}</div>
      <div class="tl-filter">Today ▾</div>
    </div>
    <div class="tl-label">Today's schedule</div>
    <div>${tlItems}</div>
    <button class="tl-view" onclick="go('library',null)">View posted library →</button>`;
}

/* ═══════════════════════════════
   PIPELINE
═══════════════════════════════ */
function renderPipeline() {
  const cols = Object.entries(DATA.kanban).map(([stage, cards]) => {
    const html = cards.map(c => {
      const cls = `kcard${stage==='Scheduled'?' scheduled':stage==='Repurpose'?' repurpose':''}`;
      const opacity = stage === 'Posted' ? ' style="opacity:.5"' : '';
      return `<div class="${cls}"${opacity}>
        <div style="margin-bottom:5px">${pill(c.pillar)}</div>
        <div class="kcard-title">${c.title}</div>
        <div class="kcard-meta">
          ${c.format?`<span class="kcard-fmt">${c.format}</span>`:''}
          ${c.priority?`<div style="margin-left:auto">${prio(c.priority)}</div>`:''}
          ${c.date?`<span class="kcard-date">${c.date}</span>`:''}
        </div>
      </div>`;
    }).join('');
    return `<div class="kcol">
      <div class="kcol-h"><span class="kcol-name">${stage}</span><span class="kcol-n">${cards.length}</span></div>
      ${html}
    </div>`;
  }).join('');

  document.getElementById('view-pipeline').innerHTML = `
    <div class="sh"><div><div class="sh-title">Editorial Pipeline</div><div class="sh-sub">Kanban · idea to posted</div></div></div>
    <div class="kanban">${cols}</div>`;
}

/* ═══════════════════════════════
   CALENDAR
═══════════════════════════════ */
function renderCalendar() {
  const cal = DATA.calendar;
  const evMap = {};
  cal.events.forEach(e => evMap[e.day] = e);

  const legend = ['obs','find','exp'].map(p => {
    const bg = p==='obs'?'var(--yellow-t)':p==='find'?'var(--blue-t)':'var(--pink-t)';
    const fc = p==='obs'?'#5a4800':p==='find'?'#1a2a5a':'#5a1a28';
    return `<span style="font-size:9px;font-weight:700;display:flex;align-items:center;gap:4px;color:${fc}"><span style="width:8px;height:8px;border-radius:3px;background:${bg};display:inline-block"></span>${LABELS[p]}</span>`;
  }).join('');

  const headers = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d=>`<div class="cv-dh">${d}</div>`).join('');
  let cells = Array(cal.startWeekday).fill('<div class="cv-d empty"></div>').join('');
  for(let d=1; d<=cal.totalDays; d++) {
    const ev = evMap[d];
    cells += `<div class="cv-d${d===cal.today?' today':''}">
      <div class="cv-num">${d}${d===cal.today?' ◉':''}</div>
      ${ev ? `<div class="cv-post ${ev.pillar}">${ev.title}</div>` : ''}
    </div>`;
  }
  const rem = (7 - ((cal.startWeekday + cal.totalDays) % 7)) % 7;
  cells += Array(rem).fill('<div class="cv-d empty" style="opacity:.2"></div>').join('');

  document.getElementById('view-calendar').innerHTML = `
    <div class="sh">
      <div><div class="sh-title">Content Calendar — ${cal.month}</div><div class="sh-sub">Mon = Observation · Thu = Cool Find · Sat/2w = Experiment</div></div>
      <div style="display:flex;gap:8px;align-items:center">${legend}</div>
    </div>
    <div class="cal-view-grid">${headers}${cells}</div>`;
}

    return `<div class="exp-card">

        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">

   PLAYBOOK
═══════════════════════════════ */
function renderPlaybook() {
  const styleMap = {
    obs:  { bg:'var(--yellow-t)', color:'#5a4800' },
    find: { bg:'var(--blue-t)',   color:'#1a2a5a' },
    exp:  { bg:'var(--pink-t)',   color:'#5a1a28' }
  };
  const ruleCards = DATA.playbook.formats.map(f => {
    const s = styleMap[f.style];
    const steps = f.steps.map((st,i)=>`<div class="rule-step"><span class="rule-n">${i+1}</span><span>${st}</span></div>`).join('');
    return `<div class="rule-card"><div class="rule-type" style="background:${s.bg};color:${s.color}">${f.type}</div>${steps}</div>`;
  }).join('');

  const alwaysTags = DATA.playbook.voiceAlways.map(t=>`<span class="vtag" style="background:var(--olive-t);color:#1a3a00">${t}</span>`).join('');
  const neverTags  = DATA.playbook.voiceNever.map(t=>`<span class="vtag" style="background:var(--pink-t);color:#5a1a28">${t}</span>`).join('');

  document.getElementById('view-playbook').innerHTML = `
    <div class="sh"><div><div class="sh-title">Writing Playbook</div><div class="sh-sub">Post structures · voice rules · never-do list</div></div></div>

        <div><div class="fl" style="margin-bottom:8px">Always be</div>${alwaysTags}</div>
        <div><div class="fl" style="margin-bottom:8px">Never be</div>${neverTags}</div>
      </div>

}

/* ═══════════════════════════════
   NAVIGATION
═══════════════════════════════ */
const VIEWS = ['dashboard','inbox','pipeline','calendar','lab','library','draft','playbook'];

function go(id, el) {
  VIEWS.forEach(v => { const e = document.getElementById('view-'+v); if(e) e.className='view'; });
  const t = document.getElementById('view-'+id);
  if(t) t.className = 'view active';
  document.querySelectorAll('.ni').forEach(n => n.classList.remove('active'));
  if(el) { el.classList.add('active'); }
  else { document.querySelectorAll('.ni').forEach(n => { if(n.getAttribute('onclick')?.includes(`'${id}'`)) n.classList.add('active'); }); }
}

/* ═══════════════════════════════
   INBOX ADD
═══════════════════════════════ */
function addInbox() {
  const idea   = document.getElementById('inbox-input').value.trim();
  if(!idea) return;
  const pillar = document.getElementById('inbox-pillar').value || 'Observation';
  const source = document.getElementById('inbox-source').value || '—';
  const tbody  = document.getElementById('inbox-body');
  const n      = String(tbody.children.length + 1).padStart(2,'0');
  const pc     = LABELS[pillar];
  const tr     = document.createElement('tr');
  tr.innerHTML = `
    <td style="font-family:var(--mono);font-size:9px;color:var(--muted)">${n}</td>
    <td style="font-size:11px;font-weight:500;max-width:200px">${idea}</td>
    <td>${pill(pc, pillar)}</td>
    <td style="font-family:var(--mono);font-size:9px;color:var(--muted)">${source}</td>
    <td style="font-family:var(--mono);font-size:9px;color:var(--muted)">Text Post</td>
    <td>${prio(3)}</td>
    <td><div class="btn dark sm" onclick="draftFrom('${pc}','${idea.replace(/'/g,"\\'")}')">Draft →</div></td>`;
  tbody.insertBefore(tr, tbody.firstChild);
  document.getElementById('inbox-input').value = '';
}

/* ═══════════════════════════════
   DRAFT GENERATE
═══════════════════════════════ */
function draftFrom(pillar, idea) {
  go('draft', null);
  document.querySelectorAll('.ni').forEach(n => { if(n.getAttribute('onclick')?.includes("'draft'")) n.classList.add('active'); });
  setTimeout(() => {
    if(idea) document.getElementById('draft-idea').value = idea;
    document.getElementById('draft-pillar').value = pillar;
    setTimeout(generateDraft, 120);
  }, 50);
}

function generateDraft() {
  const pillar = document.getElementById('draft-pillar').value;
  const out    = document.getElementById('draft-out');
  const dayEl  = document.getElementById('post-day');
  out.innerHTML = '<div class="ld"><span class="ldd"></span><span class="ldd"></span><span class="ldd"></span></div>';
  setTimeout(() => {
    const d    = DATA.drafts[pillar] || DATA.drafts.observation;
    const text = d.gen();
    dayEl.textContent = '→ Post on ' + d.day;
    const lines = text.split('\n');
    out.innerHTML = `<span class="draft-hook">${lines[0]}</span>${lines.slice(1).join('\n')}`;
  }, 1100);
}

function copyDraft() {
  const text = document.getElementById('draft-out').innerText;
  navigator.clipboard.writeText(text).catch(()=>{});
  const btn = event.target;
  const orig = btn.textContent;
  btn.textContent = 'Copied!';
  setTimeout(()=>btn.textContent=orig, 1500);
}
